services:

  # ── Database ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pdo_db
      POSTGRES_USER: pdo_user
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdo_user -d pdo_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Laravel) ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    volumes:
      # Overlay kode custom kita ke atas scaffold Laravel (hot-reload)
      - ./apps/api/app:/var/www/api/app
      - ./apps/api/database:/var/www/api/database
      - ./apps/api/routes/api.php:/var/www/api/routes/api.php
      - ./apps/api/bootstrap/app.php:/var/www/api/bootstrap/app.php
      # Persist vendor & storage di named volume (tidak di-replace oleh mount host)
      - api_vendor:/var/www/api/vendor
      - api_storage:/var/www/api/storage
    env_file:
      - docker/api/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ── Frontend (React + Vite) ───────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    environment:
      - VITE_API_TARGET=http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  api_vendor:
  api_storage:
  web_node_modules:
