services:

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  # ── Backend (Laravel — PHP-FPM + Nginx + Supervisor) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    restart: always
    env_file:
      - docker/api/.env.production
    ports:
      - "8000:80"
    depends_on:
      redis:
        condition: service_started

  # ── Frontend (React — static via Nginx) ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.pdo.barumunpalma.co.id}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  redisdata:
