services:

  # ── Database (PostgreSQL) ─────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: pdodb
      POSTGRES_USER: mhdrefdi
      POSTGRES_PASSWORD: lPcfKFrex9Hp2JasvOl7
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  # ── Backend (Laravel — PHP-FPM + Nginx + Supervisor) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    restart: always
    env_file:
      - docker/api/.env.production
    ports:
      - "8000:80"
    depends_on:
      - db
      - redis

  # ── Frontend (React — static via Nginx) ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.pdo.barumunpalma.co.id}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
