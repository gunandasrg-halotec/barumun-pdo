services:

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  # ── Backend (Laravel — PHP-FPM + Nginx + Supervisor) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    restart: always
    env_file:
      - docker/api/.env.production
    ports:
      - "8000:80"
    depends_on:
      redis:
        condition: service_started

  # ── Frontend (React — static via Nginx) ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://pdo.barumun-plantation.com}
    restart: always
    # Host nginx terminates TLS and reverse-proxies "/" to 127.0.0.1:8080 and
    # "/api/" to 127.0.0.1:8000. Web must therefore publish on 8080, not 80
    # (host nginx already owns 80/443).
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  redisdata:
