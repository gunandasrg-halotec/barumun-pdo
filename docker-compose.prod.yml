services:

  # ── Database ──────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${DB_DATABASE}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data

  # ── Backend (Laravel — PHP-FPM + Nginx + Supervisor) ─────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    restart: always
    env_file:
      - docker/api/.env.production
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Frontend (React — static via Nginx) ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.pdo.barumunpalma.co.id}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
