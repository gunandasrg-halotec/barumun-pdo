name: PDO System CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # Backend Tests
  # ─────────────────────────────────────────
  backend-test:
    name: Backend Tests (Laravel 13 / PHP 8.4)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pdo_test
          POSTGRES_USER: pdo_user
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, redis, bcmath, mbstring, xml, zip
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}

      - name: Install dependencies
        working-directory: apps/api
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Copy .env
        working-directory: apps/api
        run: cp .env.ci .env

      - name: Generate app key
        working-directory: apps/api
        run: php artisan key:generate

      - name: Run migrations
        working-directory: apps/api
        run: php artisan migrate --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: pdo_test
          DB_USERNAME: pdo_user
          DB_PASSWORD: secret

      - name: Run tests
        working-directory: apps/api
        run: php artisan test --parallel --coverage --min=70
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: pdo_test
          DB_USERNAME: pdo_user
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1

  # ─────────────────────────────────────────
  # Frontend Build Check
  # ─────────────────────────────────────────
  frontend-build:
    name: Frontend Build (React 19 / Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: TypeScript check
        working-directory: apps/web
        run: npm run type-check

      - name: Build
        working-directory: apps/web
        run: npm run build
        env:
          VITE_API_URL: https://api.pdo.barumunpalma.co.id/api/v1

  # ─────────────────────────────────────────
  # Deploy to Staging (hanya dari branch develop)
  # ─────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to Staging EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/pdo-api
            git pull origin develop
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan event:cache
            php artisan queue:restart
            sudo systemctl reload php8.4-fpm
            echo "✅ Staging deploy selesai: $(date)"

  # ─────────────────────────────────────────
  # Deploy to Production (hanya dari branch main, butuh manual approval)
  # ─────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production  # environment ini dikonfigurasi required reviewers di GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Create RDS Snapshot before deploy
        run: |
          aws rds create-db-snapshot \
            --db-instance-identifier pdo-production \
            --db-snapshot-identifier pdo-pre-deploy-$(date +%Y%m%d-%H%M%S)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-3

      - name: Deploy Backend to Production EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/pdo-api
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan event:cache
            php artisan queue:restart
            sudo systemctl reload php8.4-fpm
            echo "✅ Production deploy selesai: $(date)"
