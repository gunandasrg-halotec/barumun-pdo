name: Deploy to Production

# Manual trigger only. Auto-deploy on every push to main was disabled after an
# unattended deploy took production down: pushing code does not rebuild and
# restart prod unless a human explicitly runs this workflow.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 54.206.23.51 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@54.206.23.51 'bash -s' < ./scripts/deploy.sh

      - name: Run health checks
        run: |
          bash ./scripts/health-check.sh
        continue-on-error: true
