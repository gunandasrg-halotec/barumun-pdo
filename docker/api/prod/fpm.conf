[www]
user  = www-data
group = www-data

listen = 127.0.0.1:9000

pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Log slow requests (>3s)
request_slowlog_timeout = 3s
slowlog = /proc/1/fd/2

; Pass env vars from Docker to PHP-FPM workers
clear_env = no
